<svg viewBox="0 0 640 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#26282c"/>
      <stop offset="100%" stop-color="#1a1b1e"/>
    </linearGradient>
    <linearGradient id="scoreBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#ff8a8a"/>
    </linearGradient>
    <linearGradient id="chip" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#7f1d1d"/>
    </linearGradient>
  </defs>

  <rect width="640" height="420" rx="16" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="639" height="419" rx="15.5" fill="none" stroke="#3a2224"/>

  <!-- window chrome -->
  <rect width="640" height="40" rx="16" fill="#141517"/>
  <rect y="24" width="640" height="16" fill="#141517"/>
  <circle cx="24" cy="20" r="5" fill="#ef4444"/>
  <circle cx="42" cy="20" r="5" fill="#4a4c52"/>
  <circle cx="60" cy="20" r="5" fill="#4a4c52"/>
  <rect x="230" y="11" width="180" height="18" rx="6" fill="#1f2023"/>
  <text x="320" y="24" font-family="monospace" font-size="10" fill="#7a7c82" text-anchor="middle">atendimentos / classificar</text>

  <!-- sidebar -->
  <rect x="0" y="40" width="72" height="380" fill="#141517"/>
  <rect x="20" y="64" width="32" height="32" rx="8" fill="url(#chip)"/>
  <g fill="#5c5e64">
    <rect x="24" y="120" width="24" height="24" rx="6"/>
    <rect x="24" y="160" width="24" height="24" rx="6" fill="#ef4444"/>
    <rect x="24" y="200" width="24" height="24" rx="6"/>
    <rect x="24" y="240" width="24" height="24" rx="6"/>
  </g>

  <!-- main content -->
  <g font-family="Arial, sans-serif">
    <!-- ticket card -->
    <rect x="96" y="64" width="220" height="150" rx="12" fill="#1f2023" stroke="#3a2224"/>
    <text x="114" y="90" font-size="12" fill="#9a9ba0">Atendimento #4821</text>
    <text x="114" y="112" font-size="13" fill="#f2f3f5" font-weight="bold">"Meu pedido não chegou"</text>
    <rect x="114" y="128" width="184" height="1" fill="#3a2224"/>
    <rect x="114" y="140" width="76" height="20" rx="10" fill="rgba(239,68,68,0.15)" stroke="#ef4444"/>
    <text x="152" y="154" font-size="10" fill="#ff8a8a" text-anchor="middle">Logística</text>
    <rect x="198" y="140" width="70" height="20" rx="10" fill="rgba(242,243,245,0.08)"/>
    <text x="233" y="154" font-size="10" fill="#c7c8cc" text-anchor="middle">Negativo</text>
    <text x="114" y="184" font-size="10" fill="#9a9ba0">Criticidade</text>
    <rect x="114" y="190" width="184" height="6" rx="3" fill="#33343a"/>
    <rect x="114" y="190" width="140" height="6" rx="3" fill="url(#scoreBar)"/>

    <!-- score gauge card -->
    <rect x="332" y="64" width="212" height="150" rx="12" fill="#1f2023" stroke="#3a2224"/>
    <text x="350" y="90" font-size="12" fill="#9a9ba0">Score de qualidade</text>
    <circle cx="400" cy="150" r="46" fill="none" stroke="#33343a" stroke-width="10"/>
    <circle cx="400" cy="150" r="46" fill="none" stroke="#ef4444" stroke-width="10" stroke-dasharray="217 289" stroke-linecap="round" transform="rotate(-90 400 150)"/>
    <text x="400" y="156" font-size="20" fill="#f2f3f5" font-weight="bold" text-anchor="middle">8.7</text>
    <text x="470" y="120" font-size="10" fill="#9a9ba0">Empatia</text>
    <rect x="470" y="126" width="60" height="5" rx="2.5" fill="#33343a"/>
    <rect x="470" y="126" width="50" height="5" rx="2.5" fill="#ef4444"/>
    <text x="470" y="150" font-size="10" fill="#9a9ba0">Clareza</text>
    <rect x="470" y="156" width="60" height="5" rx="2.5" fill="#33343a"/>
    <rect x="470" y="156" width="44" height="5" rx="2.5" fill="#ef4444"/>
    <text x="470" y="180" font-size="10" fill="#9a9ba0">Resolução</text>
    <rect x="470" y="186" width="60" height="5" rx="2.5" fill="#33343a"/>
    <rect x="470" y="186" width="38" height="5" rx="2.5" fill="#ef4444"/>

    <!-- bottom row: batch + chat -->
    <rect x="96" y="230" width="220" height="150" rx="12" fill="#1f2023" stroke="#3a2224"/>
    <text x="114" y="256" font-size="12" fill="#9a9ba0">Processamento em lote</text>
    <rect x="114" y="270" width="184" height="10" rx="5" fill="#33343a"/>
    <rect x="114" y="270" width="132" height="10" rx="5" fill="url(#scoreBar)"/>
    <text x="114" y="298" font-size="10" fill="#9a9ba0">312 / 420 atendimentos classificados</text>
    <g font-size="10" fill="#c7c8cc">
      <text x="114" y="322">✔ CSV importado</text>
      <text x="114" y="340">✔ Categorias aplicadas</text>
      <text x="114" y="358">… Aprendendo com correções</text>
    </g>

    <rect x="332" y="230" width="212" height="150" rx="12" fill="#1f2023" stroke="#3a2224"/>
    <text x="350" y="256" font-size="12" fill="#9a9ba0">Acurácia da IA</text>
    <text x="350" y="290" font-size="26" fill="#f2f3f5" font-weight="bold">92%</text>
    <text x="350" y="308" font-size="10" fill="#9a9ba0">vs. correção humana (30d)</text>
    <polyline points="350,360 372,344 394,352 416,330 438,336 460,318 482,326" fill="none" stroke="#ef4444" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
